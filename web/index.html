<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coldless AI Radar</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root {
  --bg: #f5f5f4;
  --surface: #ffffff;
  --border: #e7e5e4;
  --border-hover: #a8a29e;
  --text-primary: #1c1917;
  --text-secondary: #57534e;
  --text-muted: #a8a29e;
  --accent: #0066cc;
  color-scheme: light;
}
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text-primary); margin: 0; padding: 0; line-height: 1.6; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }

/* Layout */
.container { max-width: 1280px; margin: 0 auto; padding: 16px 16px 60px; }
header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.brand { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; display: flex; align-items: baseline; gap: 10px; }
.brand-accent { color: var(--accent); }
.brand-meta { font-size: 12px; color: var(--text-muted); font-weight: 400; }
.header-right { display: flex; align-items: center; gap: 10px; }
.update-chip { display: inline-flex; align-items: center; gap: 6px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 20px; padding: 5px 12px; cursor: pointer; font-size: 11.5px; color: #15803d; font-family: inherit; transition: background 0.12s; white-space: nowrap; user-select: none; }
.update-chip:hover { background: #dcfce7; }
.update-chip.loading { background: #f9fafb; border-color: var(--border); color: var(--text-muted); }
.update-dot { width: 6px; height: 6px; border-radius: 50%; background: #16a34a; flex-shrink: 0; }
.update-chip.loading .update-dot { background: #d1d5db; }
.update-icon { font-size: 12px; opacity: 0.6; }

/* Tabs */
.tabs { display: flex; gap: 2px; margin-bottom: 14px; border-bottom: 1px solid var(--border); }
.tab { padding: 9px 16px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; transition: all 0.12s; white-space: nowrap; }
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.tab .cnt { display: inline-block; margin-left: 5px; font-size: 10px; background: #e7e5e4; color: var(--text-muted); padding: 1px 5px; border-radius: 8px; }
.tab.active .cnt { background: #dbeafe; color: #1d4ed8; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Category colors */
:root {
  --c-model:    #8b5cf6; --c-model-bg:    #f5f3ff;
  --c-agent:    #6366f1; --c-agent-bg:    #eef2ff;
  --c-research: #3b82f6; --c-research-bg: #eff6ff;
  --c-product:  #0d9488; --c-product-bg:  #f0fdfa;
  --c-industry: #6b7280; --c-industry-bg: #f9fafb;
  --c-community:#16a34a; --c-community-bg:#f0fdf4;
  --c-invest:   #d97706; --c-invest-bg:   #fffbeb;
  --c-supply:   #ea580c; --c-supply-bg:   #fff7ed;
}

/* News cards grid */
.cards-grid { display: grid; gap: 10px; grid-template-columns: 1fr; }
@media(min-width:700px) { .cards-grid { grid-template-columns: repeat(2,1fr); } }
@media(min-width:1060px) { .cards-grid { grid-template-columns: repeat(3,1fr); } }

.news-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 13px 14px 11px; display: flex; flex-direction: column; gap: 6px; transition: border-color 0.12s, box-shadow 0.12s; position: relative; border-left-width: 3px; }
.news-card:hover { border-color: var(--border-hover); box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
.news-card.high { background: #fefce8; }

/* card meta row */
.card-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.cat-tag { font-size: 10.5px; font-weight: 600; padding: 2px 7px; border-radius: 3px; }
.multi-badge { font-size: 10px; padding: 2px 7px; border-radius: 3px; background: #fef3c7; color: #92400e; font-weight: 600; border: 1px solid #fde68a; }
.src-list { font-size: 10.5px; color: var(--text-muted); }
.time-tag { font-size: 10.5px; color: var(--text-muted); margin-left: auto; }

/* card body */
.card-summary { font-size: 13.5px; font-weight: 500; color: var(--text-primary); line-height: 1.55; margin: 0; flex: 1; }
.card-title-en { font-size: 11px; color: var(--text-muted); line-height: 1.4; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* card footer */
.card-footer { display: flex; align-items: center; justify-content: flex-end; margin-top: 2px; }
.read-link { font-size: 11.5px; color: var(--accent); font-weight: 500; }
.read-link:hover { text-decoration: underline; }

/* Section headers */
.section-head { display: flex; align-items: center; gap: 8px; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 2px solid var(--border); }
.section-icon { font-size: 15px; }
.section-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.section-sub { font-size: 11px; color: var(--text-muted); margin-left: auto; }
.live-dot { font-size: 10px; padding: 2px 6px; border-radius: 8px; background: #f0fdf4; color: #16a34a; font-weight: 600; }

/* Rankings */
.rankings-grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); margin-bottom: 16px; }
.rank-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.rank-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px dashed var(--border); gap: 6px; }
.rank-title { font-size: 12.5px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.rank-date { font-size: 10px; color: var(--text-muted); white-space: nowrap; }
.rank-list { list-style: none; padding: 0; margin: 0; }
.rank-list li { font-size: 11.5px; color: var(--text-secondary); padding: 3px 0; display: flex; align-items: center; gap: 5px; }
.rank-num { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; background: #f3f4f6; color: var(--text-muted); border-radius: 3px; font-size: 9.5px; font-weight: 700; flex-shrink: 0; }
.rank-num.top3 { background: #fef3c7; color: #92400e; }
.rank-val { margin-left: auto; color: var(--text-muted); font-size: 10.5px; font-family: monospace; white-space: nowrap; }
.rank-gh-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rank-link { display: block; margin-top: 8px; padding-top: 6px; border-top: 1px dashed var(--border); font-size: 11px; color: var(--accent); }
.rank-link:hover { text-decoration: underline; }
.entry-desc { font-size: 11.5px; color: var(--text-secondary); }
.entry-desc li { padding: 2px 0; }

/* Stocks */
.stocks-grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); margin-bottom: 16px; }
.stock-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 13px; display: flex; flex-direction: column; gap: 3px; text-decoration: none; color: inherit; transition: border-color 0.12s, box-shadow 0.12s; position: relative; }
.stock-card:hover { border-color: var(--border-hover); box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
.stock-region-badge { position: absolute; top: 9px; right: 9px; font-size: 9px; padding: 1px 5px; border-radius: 3px; background: #f3f4f6; color: var(--text-muted); font-weight: 600; }
.stock-ticker { font-size: 13px; font-weight: 700; }
.stock-name { font-size: 10.5px; color: var(--text-muted); }
.stock-price { font-size: 18px; font-weight: 600; margin-top: 2px; }
.stock-change { font-size: 11px; font-weight: 500; }
.up { color: #dc2626; }
.down { color: #16a34a; }
.spark { height: 40px; margin-top: 6px; }
.spark canvas { width: 100% !important; height: 100% !important; }

/* Sources block — 平铺 */
.sources-block { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-top: 24px; }
.sources-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin: 0 0 10px; }
.pills-flat { display: flex; flex-wrap: wrap; gap: 5px; }
.pill-f { display: inline-flex; align-items: center; gap: 3px; padding: 3px 9px; border-radius: 10px; font-size: 11px; font-weight: 500; border: 1.5px solid; text-decoration: none; transition: opacity 0.12s; }
.pill-f:hover { opacity: 0.75; }
.pill-stars { font-size: 9px; opacity: 0.65; }
/* 类别色 */
.pill-f.scan    { border-color: #93c5fd; background: #eff6ff; color: #1e40af; }
.pill-f.letter  { border-color: #c4b5fd; background: #f5f3ff; color: #5b21b6; }
.pill-f.data    { border-color: #6ee7b7; background: #ecfdf5; color: #065f46; }
.pill-f.research{ border-color: #86efac; background: #f0fdf4; color: #15803d; }
.pill-f.invest  { border-color: #fca5a5; background: #fef2f2; color: #b91c1c; }
.pill-f.supply  { border-color: #d1d5db; background: #f9fafb; color: #374151; }

/* Archive list (全部新闻 tab) */
.news-list { display: flex; flex-direction: column; }
.date-divider { font-size: 10.5px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-muted); padding: 16px 0 7px; border-bottom: 1px solid var(--border); }
.news-row { display: flex; align-items: center; gap: 8px; padding: 9px 4px; border-bottom: 1px solid #f0efee; text-decoration: none; color: inherit; border-radius: 5px; transition: background 0.08s; }
.news-row:hover { background: #fafaf9; }
.row-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.row-cat { font-size: 9.5px; font-weight: 600; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; white-space: nowrap; }
.row-title { flex: 1; font-size: 13px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.row-srcs { font-size: 11px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
.row-time { font-size: 10.5px; color: var(--text-muted); white-space: nowrap; min-width: 28px; text-align: right; flex-shrink: 0; }

/* Misc */
.err-box { background: #fef2f2; border-left: 3px solid #dc2626; padding: 9px 13px; border-radius: 0 6px 6px 0; font-size: 12px; color: #991b1b; margin-bottom: 12px; }
footer { margin-top: 28px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); text-align: center; }
footer code { background: #f3f4f6; padding: 1px 4px; border-radius: 3px; }
.empty-tip { font-size: 12.5px; color: var(--text-muted); padding: 12px 0; }
.freq-badge { font-size: 9.5px; padding: 1px 5px; border-radius: 6px; font-weight: 600; }
.freq-daily   { background: #fef2f2; color: #dc2626; }
.freq-weekly  { background: #eff6ff; color: #2563eb; }
.freq-monthly { background: #f0fdf4; color: #16a34a; }
.freq-quarter { background: #faf5ff; color: #9333ea; }

/* ── Ticker ────────────────────────────────────────────────────────────── */
.ticker-wrap { background: #111; overflow: hidden; height: 34px; display: none; align-items: center; margin: 10px -16px 14px; }
.ticker-label { font-size: 9.5px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 0 14px; background: #0066cc; color: #fff; height: 100%; display: flex; align-items: center; flex-shrink: 0; white-space: nowrap; }
.ticker-scroll { overflow: hidden; flex: 1; height: 100%; display: flex; align-items: center; }
.ticker-track { display: inline-flex; align-items: center; white-space: nowrap; animation: ticker-run 60s linear infinite; }
.ticker-track:hover { animation-play-state: paused; }
.ticker-item { display: inline-flex; align-items: center; color: #d1d5db; font-size: 12px; padding: 0 28px 0 0; gap: 6px; }
.ticker-item a { color: #e5e7eb; text-decoration: none; transition: color 0.12s; }
.ticker-item a:hover { color: #fff; text-decoration: underline; }
.ticker-sep { color: #374151; font-size: 16px; margin-right: 28px; }
.ticker-src { font-size: 9.5px; background: #374151; color: #9ca3af; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; }
@keyframes ticker-run {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* ── Header watermark ───────────────────────────────────────────────────── */
header { position: relative; overflow: hidden; }
.header-bg { position: absolute; top: -20%; right: -2%; bottom: -20%; width: 45%; background: url('assets/coldless-bg.jpg') center/contain no-repeat; mix-blend-mode: screen; opacity: 0.22; pointer-events: none; transform: rotate(-3deg); }
</style>
</head>
<body>
<div class="container">

<header>
  <div class="header-bg"></div>
  <div class="brand">
    Coldless <span class="brand-accent">AI Radar</span>
    <span class="brand-meta" id="dateStr"></span>
  </div>
  <div class="header-right">
    <button class="update-chip loading" id="refreshBtn" title="点击重新读取本地缓存（不消耗 API，不重新抓取数据）">
      <span class="update-dot"></span>
      <span id="updatedTag">加载中…</span>
      <span class="update-icon">↺</span>
    </button>
  </div>
</header>

<div class="ticker-wrap" id="tickerWrap">
  <div class="ticker-label">重要</div>
  <div class="ticker-scroll">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>
</div>

<div id="errBox" class="err-box" style="display:none"></div>

<div class="tabs">
  <button class="tab active" data-tab="feed">近期要闻 <span class="cnt" id="cntFeed"></span></button>
  <button class="tab" data-tab="models">模型 & 榜单 <span class="cnt" id="cntModels"></span></button>
  <button class="tab" data-tab="invest">投融资 & 二级 <span class="cnt" id="cntInvest"></span></button>
  <button class="tab" data-tab="all">全部新闻 <span class="cnt" id="cntAll"></span></button>
</div>

<!-- Tab 1: 今日要闻 -->
<div class="tab-panel active" id="tab-feed">
  <div id="feedGrid" class="cards-grid"></div>
  <div id="feedSources"></div>
</div>

<!-- Tab 2: 模型 & 榜单 -->
<div class="tab-panel" id="tab-models">
  <div class="section-head"><span class="section-icon">🚀</span><span class="section-title">模型 & 研究</span></div>
  <div id="modelGrid" class="cards-grid"></div>
  <div class="section-head" style="margin-top:24px"><span class="section-icon">📊</span><span class="section-title">榜单总览</span><span class="section-sub">日更数据 + 链接入口</span></div>
  <div id="rankingsAll" class="rankings-grid"></div>
</div>

<!-- Tab 3: 投融资 & 二级 -->
<div class="tab-panel" id="tab-invest">
  <div id="investGrid" class="cards-grid"></div>
  <div class="section-head" style="margin-top:24px"><span class="section-icon">📈</span><span class="section-title">AI 核心标的</span><span class="section-sub">美 / A / 港 · 30 天收盘</span><span class="live-dot">日更</span></div>
  <div id="stocksGrid" class="stocks-grid"></div>
</div>

<!-- Tab 4: 全部新闻 -->
<div class="tab-panel" id="tab-all">
  <div id="archiveList" class="news-list"></div>
</div>

<div class="sources-block">
  <div class="sources-title" id="sourcesTitle">🔗 信源直达</div>
  <div id="sourcesWrap"></div>
</div>

<footer>
  Coldless AI Radar · 数据由 <code>run_daily.sh</code> 每日 10:00 拉取 · Claude 打分排序
</footer>
</div>

<script>
// ── 类目配置 ──────────────────────────────────────────────────────────────
const CAT = {
  '模型发布':   { color:'var(--c-model)',    bg:'var(--c-model-bg)',    tab:'models' },
  'AI Agent':   { color:'var(--c-agent)',    bg:'var(--c-agent-bg)',    tab:'models' },
  '研究技术':   { color:'var(--c-research)', bg:'var(--c-research-bg)', tab:'models' },
  '产品动态':   { color:'var(--c-product)',  bg:'var(--c-product-bg)',  tab:'feed'   },
  '行业动态':   { color:'var(--c-industry)', bg:'var(--c-industry-bg)', tab:'feed'   },
  '社区信号':   { color:'var(--c-community)',bg:'var(--c-community-bg)',tab:'feed'   },
  '融资并购':   { color:'var(--c-invest)',   bg:'var(--c-invest-bg)',   tab:'invest' },
  '算力供应链': { color:'var(--c-supply)',   bg:'var(--c-supply-bg)',   tab:'invest' },
};
function catColor(c) { return (CAT[c]||{color:'#6b7280'}).color; }
function catBg(c)    { return (CAT[c]||{bg:'#f9fafb'}).bg; }
function catTab(c)   { return (CAT[c]||{tab:'feed'}).tab; }

// ── 榜单入口（真实链接，待接入真数据）────────────────────────────────────
const ENTRY_RANKINGS = [
  { icon:'🥊', title:'LMArena',           freq:'weekly', desc:['众包盲测 Elo 排名', '主观接受度黄金标准'],   url:'https://lmarena.ai/leaderboard' },
  { icon:'📊', title:'Artificial Analysis',freq:'weekly', desc:['性能×价格独立评测', '性价比 Pareto 前沿'],   url:'https://artificialanalysis.ai/leaderboards/models' },
  { icon:'🏆', title:'Open LLM Leaderboard',freq:'daily', desc:['HuggingFace 开源基准榜', 'IFEval/BBH/MATH/GPQA'], url:'https://huggingface.co/spaces/open-llm-leaderboard/open_llm_leaderboard' },
  { icon:'📄', title:'Papers With Code',   freq:'daily',  desc:['论文+代码趋势榜', 'SOTA 任务追踪'],           url:'https://paperswithcode.com/trending' },
  { icon:'🔬', title:'Scale SEAL',         freq:'weekly', desc:['企业级 AI 能力评测', 'Scale AI 独立基准'],     url:'https://scale.com/leaderboard' },
  { icon:'🦙', title:'AlpacaEval',         freq:'weekly', desc:['指令遵循能力排名', 'GPT-4 胜率对比'],         url:'https://tatsu-lab.github.io/alpaca_eval/' },
];

// ── 信源直达（平铺，type=框色，key=pipeline key for ★count）─────────────
const SOURCES = [
  // 扫描层 — 蓝
  {name:'Techmeme',    type:'scan',    key:'news_techmeme',         url:'https://techmeme.com'},
  {name:'HN',          type:'scan',    key:'community_hn',          url:'https://news.ycombinator.com'},
  {name:'量子位',      type:'scan',    key:'news_qbitai',           url:'https://www.qbitai.com'},
  {name:'机器之心',    type:'scan',    key:null,                    url:'https://www.jiqizhixin.com'},
  {name:'雷峰网',      type:'scan',    key:'news_leiphone',         url:'https://www.leiphone.com'},
  {name:'36氪',        type:'scan',    key:'news_36kr',             url:'https://36kr.com/information/AI'},
  {name:'VentureBeat', type:'scan',    key:'news_venturebeat',      url:'https://venturebeat.com/ai/'},
  {name:'The Verge',   type:'scan',    key:'news_verge_ai',         url:'https://www.theverge.com/ai-artificial-intelligence'},
  {name:'Reddit ML',   type:'scan',    key:'community_reddit',      url:'https://www.reddit.com/r/MachineLearning/'},
  // Newsletter — 紫
  {name:'TLDR AI',     type:'letter',  key:'news_tldr_ai',          url:'https://tldr.tech/ai'},
  {name:'Import AI',   type:'letter',  key:'news_import_ai',        url:'https://importai.substack.com'},
  {name:'Latent Space',type:'letter',  key:'news_latent',           url:'https://www.latent.space'},
  {name:'SemiAnalysis',type:'letter',  key:'news_semianalysis',     url:'https://www.semianalysis.com'},
  // 数据榜单 — 绿
  {name:'OpenRouter',  type:'data',    key:'rankings_openrouter',   url:'https://openrouter.ai/rankings'},
  {name:'GitHub Trend',type:'data',    key:'github_trending',       url:'https://github.com/trending'},
  {name:'HuggingFace', type:'data',    key:'huggingface_trending',  url:'https://huggingface.co/models?sort=trending'},
  {name:'Product Hunt',type:'data',    key:'news_producthunt',      url:'https://www.producthunt.com/topics/artificial-intelligence'},
  {name:'LMArena',     type:'data',    key:null,                    url:'https://lmarena.ai/leaderboard'},
  {name:'Art.Analysis',type:'data',    key:null,                    url:'https://artificialanalysis.ai/leaderboards/models'},
  // 研究 — 浅绿
  {name:'arXiv AI',    type:'research',key:'research_arxiv',        url:'https://arxiv.org/list/cs.AI/recent'},
  {name:'PapersWCode', type:'research',key:null,                    url:'https://paperswithcode.com/trending'},
  // 投资 — 红
  {name:'Y Combinator',type:'invest',  key:null,                    url:'https://www.ycombinator.com/companies?industries=AI'},
  {name:'36氪融资',    type:'invest',  key:null,                    url:'https://36kr.com/information/AI'},
  // 上下游 — 灰
  {name:'TrendForce',  type:'supply',  key:null,                    url:'https://www.trendforce.com'},
  {name:'芯东西',      type:'supply',  key:null,                    url:'https://zhidx.com'},
];

// ── 工具 ──────────────────────────────────────────────────────────────────
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function getJSON(p){ const r=await fetch(p,{cache:'no-store'}); if(!r.ok)throw new Error(p+' '+r.status); return r.json(); }
function freqBadge(f){ const L={daily:'日',weekly:'周',monthly:'月',quarter:'季'}; return f?`<span class="freq-badge freq-${f}">${L[f]||f}</span>`:''; }

// ── 运行态数据 ─────────────────────────────────────────────────────────────
let DIGEST = [];   // digest.json items（去重+打分）
let RANKINGS = []; // openrouter
let STOCKS = [];
let META = {};
let GITHUB_TRENDING = {};
let HF_TRENDING = {};
let PINNED   = { items: [] }; // pinned.json（重要新闻，保留14天）
let ARCHIVE  = { items: [] }; // archive.json（30天历史归档）

// ── 卡片渲染 ──────────────────────────────────────────────────────────────
function newsCard(item) {
  const cat = item.category || '行业动态';
  const isHigh = (item.relevance_score || 0) >= 0.8;
  const isMulti = (item.source_count || 1) >= 2;
  const srcNames = (item.sources || [item._source]).filter(Boolean);

  const multiBadge = isMulti
    ? `<span class="multi-badge">📡 ${item.source_count}源</span>`
    : '';
  const srcLabel = srcNames.join(' · ');

  const summary = item.summary_cn || item.summary || '';
  const titleEn = item.title || '';

  return `<div class="news-card${isHigh?' high':''}" style="border-left-color:${catColor(cat)}">
    <div class="card-meta">
      <span class="cat-tag" style="background:${catBg(cat)};color:${catColor(cat)}">${esc(cat)}</span>
      ${multiBadge}
      <span class="src-list">${esc(srcLabel)}</span>
      ${item.time ? `<span class="time-tag">${esc(item.time)}</span>` : ''}
    </div>
    <p class="card-summary">${esc(summary)}</p>
    ${titleEn ? `<p class="card-title-en">${esc(titleEn)}</p>` : ''}
    <div class="card-footer">
      ${item.url ? `<a class="read-link" href="${esc(item.url)}" target="_blank" rel="noopener">查看原文 →</a>` : ''}
    </div>
  </div>`;
}

function renderGrid(containerId, items) {
  const el = document.getElementById(containerId);
  if (!items.length) { el.innerHTML = '<p class="empty-tip">暂无数据</p>'; return; }
  el.innerHTML = items.map(newsCard).join('');
}

// ── 榜单渲染 ──────────────────────────────────────────────────────────────
function renderOpenRouter(containerId) {
  const el = document.getElementById(containerId);
  if (!RANKINGS.length) { el.innerHTML = '<p class="empty-tip">暂无 OpenRouter 数据</p>'; return; }
  const r = RANKINGS[0];
  el.innerHTML = `<div class="rank-card">
    <div class="rank-head">
      <div class="rank-title">🤖 ${esc(r.title)} ${freqBadge(r.freq)}</div>
      <div class="rank-date">${esc(r.updated||'')}</div>
    </div>
    <ol class="rank-list">${(r.rows||[]).map(it=>`<li>
      <span class="rank-num${it.rank<=3?' top3':''}">${it.rank}</span>
      ${esc(it.name)}
      <span class="rank-val">${esc(it.value)}</span>
    </li>`).join('')}</ol>
    <a class="rank-link" href="${esc(r.url)}" target="_blank" rel="noopener">访问 OpenRouter 榜单 →</a>
  </div>`;
}

function renderGithubCard() {
  const d = GITHUB_TRENDING;
  if (!d.items?.length) return renderStaticEntry(ENTRY_RANKINGS[2]);
  return `<div class="rank-card">
    <div class="rank-head">
      <div class="rank-title">⭐ ${esc(d.title)} ${freqBadge(d.freq)}</div>
      <div class="rank-date">${esc((d.updated||'').slice(0,10))}</div>
    </div>
    <ol class="rank-list">${d.items.map(it=>`<li>
      <span class="rank-num${it.rank<=3?' top3':''}">${it.rank}</span>
      <span class="rank-gh-name">${esc(it.full_name)}</span>
      <span class="rank-val">${it.stars_today>0?'+'+it.stars_today+' ⭐':''}</span>
    </li>`).join('')}</ol>
    <a class="rank-link" href="${esc(d.url)}" target="_blank" rel="noopener">查看 GitHub Trending →</a>
  </div>`;
}

function renderHFCard() {
  const d = HF_TRENDING;
  if (!d.items?.length) return renderStaticEntry(ENTRY_RANKINGS[3]);
  return `<div class="rank-card">
    <div class="rank-head">
      <div class="rank-title">🤗 ${esc(d.title)} ${freqBadge(d.freq)}</div>
      <div class="rank-date">${esc((d.updated||'').slice(0,10))}</div>
    </div>
    <ol class="rank-list">${d.items.map(it=>`<li>
      <span class="rank-num${it.rank<=3?' top3':''}">${it.rank}</span>
      <span class="rank-gh-name">${esc(it.model_id)}</span>
      <span class="rank-val">${it.pipeline_label?'['+it.pipeline_label+']':''} ♥${it.likes||0}</span>
    </li>`).join('')}</ol>
    <a class="rank-link" href="${esc(d.url)}" target="_blank" rel="noopener">查看 HuggingFace Trending →</a>
  </div>`;
}

function renderStaticEntry(r) {
  return `<div class="rank-card">
    <div class="rank-head"><div class="rank-title">${r.icon} ${esc(r.title)} ${freqBadge(r.freq)}</div></div>
    <ul class="rank-list entry-desc">${r.desc.map(d=>`<li><span class="rank-num">·</span>${esc(d)}</li>`).join('')}</ul>
    <a class="rank-link" href="${esc(r.url)}" target="_blank" rel="noopener">访问榜单 →</a>
  </div>`;
}

// 统一榜单渲染：实时数据卡 + 链接入口卡，同一个 grid
function renderAllRankings(containerId) {
  // 实时数据：OpenRouter + GitHub + HuggingFace
  const openrouterHtml = (() => {
    if (!RANKINGS.length) return '<div class="rank-card"><p class="empty-tip">暂无 OpenRouter 数据</p></div>';
    const r = RANKINGS[0];
    return `<div class="rank-card">
      <div class="rank-head">
        <div class="rank-title">🤖 ${esc(r.title)} ${freqBadge(r.freq)}</div>
        <div class="rank-date">${esc(r.updated||'')}</div>
      </div>
      <ol class="rank-list">${(r.rows||[]).map(it=>`<li>
        <span class="rank-num${it.rank<=3?' top3':''}">${it.rank}</span>
        ${esc(it.name)}
        <span class="rank-val">${esc(it.value)}</span>
      </li>`).join('')}</ol>
      <a class="rank-link" href="${esc(r.url)}" target="_blank" rel="noopener">访问 OpenRouter →</a>
    </div>`;
  })();

  document.getElementById(containerId).innerHTML =
    openrouterHtml +
    renderGithubCard() +
    renderHFCard() +
    ENTRY_RANKINGS.map(r => renderStaticEntry(r)).join('');
}

function renderEntryRankings(containerId) {
  document.getElementById(containerId).innerHTML =
    renderGithubCard() +
    renderHFCard() +
    ENTRY_RANKINGS.map(r => renderStaticEntry(r)).join('');
}

// ── 股票渲染 ──────────────────────────────────────────────────────────────
let sparkCharts = {};
function renderStocks() {
  const el = document.getElementById('stocksGrid');
  if (!STOCKS.length) { el.innerHTML = '<p class="empty-tip">暂无股票数据</p>'; return; }

  el.innerHTML = STOCKS.map((s,i) => {
    const sym = s.currency==='CNY'?'¥':(s.currency==='HKD'?'HK$':'$');
    const h = s.history_30d || [];
    const up = h.length >= 2 ? h[h.length-1] >= h[0] : true;
    return `<a class="stock-card" href="${esc(s.url)}" target="_blank" rel="noopener">
      <span class="stock-region-badge">${esc(s.region)}</span>
      <div class="stock-ticker">${esc(s.ticker.replace(/\.(SS|SZ|HK)$/,''))}</div>
      <div class="stock-name">${esc(s.name)}</div>
      <div class="stock-price ${up?'up':'down'}">${sym}${Number(s.price).toLocaleString()}</div>
      <div class="spark"><canvas id="sp${i}"></canvas></div>
    </a>`;
  }).join('');

  Object.values(sparkCharts).forEach(c => c.destroy?.());
  sparkCharts = {};
  requestAnimationFrame(() => {
    STOCKS.forEach((s, i) => {
      const canvas = document.getElementById(`sp${i}`);
      if (!canvas) return;
      const h = s.history_30d || [];
      const up = h.length >= 2 ? h[h.length-1] >= h[0] : true;
      const col = up ? '#dc2626' : '#16a34a';
      sparkCharts[s.ticker] = new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: { labels: h.map((_,j)=>j), datasets: [{ data: h, borderColor: col, backgroundColor: up?'rgba(220,38,38,0.06)':'rgba(22,163,74,0.06)', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 1.5 }] },
        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{enabled:false}}, scales:{x:{display:false},y:{display:false}}, animation:false }
      });
    });
  });
}

// ── 信源直达 ──────────────────────────────────────────────────────────────
function renderSources() {
  const perFile = META?.stats?.per_file || {};
  const active = SOURCES.filter(s => s.key && perFile[s.key] > 0).length;
  const title = `🔗 信源直达 · ★${active} 接入`;
  document.getElementById('sourcesTitle').textContent = title;
  document.getElementById('sourcesWrap').innerHTML =
    `<div class="pills-flat">${SOURCES.map(s => {
      const cnt = s.key ? perFile[s.key] : null;
      const stars = cnt ? `<span class="pill-stars">★${cnt}</span>` : '';
      return `<a class="pill-f ${s.type}" href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)}${stars}</a>`;
    }).join('')}</div>`;
}

// ── 数据加载 ──────────────────────────────────────────────────────────────
async function loadData() {
  const errs = [];
  try { META = await getJSON('../data/_index.json'); } catch(e) { META = {files:{}}; errs.push('_index.json: '+e.message); }

  const files = META.files || {};

  // Digest (主数据源：打分+去重+摘要)
  DIGEST = [];
  const chip = document.getElementById('refreshBtn');
  const tag  = document.getElementById('updatedTag');
  if (files.digest) {
    try {
      const d = await getJSON('../data/'+files.digest);
      DIGEST = d.items || [];
      if (d.updated) {
        const dt = new Date(d.updated);
        const now = new Date();
        const isToday = dt.toDateString() === now.toDateString();
        const mm = String(dt.getMonth()+1).padStart(2,'0');
        const dd = String(dt.getDate()).padStart(2,'0');
        const hh = String(dt.getHours()).padStart(2,'0');
        const mi = String(dt.getMinutes()).padStart(2,'0');
        tag.textContent = isToday ? `今日 ${hh}:${mi} 已更新` : `${mm}-${dd} ${hh}:${mi} 已更新`;
        chip.classList.remove('loading');
      } else {
        tag.textContent = '数据已加载';
        chip.classList.remove('loading');
      }
    } catch(e) { errs.push('digest.json: '+e.message); tag.textContent = '加载失败'; }
  }

  // OpenRouter
  RANKINGS = [];
  if (files.rankings_openrouter) {
    try {
      const d = await getJSON('../data/'+files.rankings_openrouter);
      RANKINGS = [{ title: d.title||'OpenRouter 榜单', freq: d.freq||'daily', updated: d.updated||'', url: d.url||'https://openrouter.ai/rankings', rows: d.items||[] }];
    } catch(e) { errs.push('rankings_openrouter: '+e.message); }
  }

  // Stocks
  STOCKS = [];
  if (files.stocks) {
    try { const d = await getJSON('../data/'+files.stocks); STOCKS = d.stocks||[]; }
    catch(e) { errs.push('stocks: '+e.message); }
  }

  // GitHub Trending
  GITHUB_TRENDING = {};
  if (files.github_trending) {
    try { GITHUB_TRENDING = await getJSON('../data/'+files.github_trending); }
    catch(e) { errs.push('github_trending: '+e.message); }
  }

  // HuggingFace Trending
  HF_TRENDING = {};
  if (files.huggingface_trending) {
    try { HF_TRENDING = await getJSON('../data/'+files.huggingface_trending); }
    catch(e) { errs.push('huggingface_trending: '+e.message); }
  }

  // Pinned（重要新闻滚动栏，不依赖 _index）
  PINNED = { items: [] };
  try { PINNED = await getJSON('../data/pinned.json'); } catch(e) {}

  // Archive（全部新闻历史归档）
  ARCHIVE = { items: [] };
  if (files.archive) {
    try { ARCHIVE = await getJSON('../data/'+files.archive); }
    catch(e) { errs.push('archive: '+e.message); }
  } else {
    try { ARCHIVE = await getJSON('../data/archive.json'); } catch(e) {}
  }

  const errBox = document.getElementById('errBox');
  if (errs.length) { errBox.style.display='block'; errBox.textContent = '⚠️ 部分数据加载失败：'+errs.join('；'); }
  else { errBox.style.display='none'; }
}

// ── 归档列表渲染（全部新闻 tab）─────────────────────────────────────────────
function relTime(isoStr) {
  if (!isoStr) return '';
  const diff = Date.now() - new Date(isoStr).getTime();
  const h = diff / 3600000;
  if (h < 1)  return Math.floor(diff / 60000) + 'm';
  if (h < 24) return Math.floor(h) + 'h';
  const d = Math.floor(h / 24);
  return d + 'd';
}

function dateDividerLabel(isoStr) {
  if (!isoStr) return '';
  const dt  = new Date(isoStr);
  const now = new Date();
  const diffDays = Math.floor((Date.now() - dt.getTime()) / 86400000);
  const mm  = String(dt.getMonth() + 1).padStart(2, '0');
  const dd  = String(dt.getDate()).padStart(2, '0');
  if (diffDays === 0) return `今日 · ${mm}月${dd}日`;
  if (diffDays === 1) return `昨日 · ${mm}月${dd}日`;
  return `${mm}月${dd}日`;
}

function renderArchive() {
  const el = document.getElementById('archiveList');
  const items = (ARCHIVE.items || []);
  document.getElementById('cntAll').textContent = items.length;
  if (!items.length) { el.innerHTML = '<p class="empty-tip">暂无归档数据，明日 10:00 管线运行后自动生成</p>'; return; }

  let html = '';
  let lastDay = '';
  for (const it of items) {
    const dateKey = (it.published_at || it.first_seen_at || '').slice(0, 10);
    if (dateKey && dateKey !== lastDay) {
      html += `<div class="date-divider">${esc(dateDividerLabel(it.published_at || it.first_seen_at))}</div>`;
      lastDay = dateKey;
    }
    const cat   = it.category || '行业动态';
    const text  = it.summary_cn || it.title || '';
    const srcs  = (it.sources || []).slice(0, 3).join(' · ');
    const tstr  = relTime(it.published_at || it.first_seen_at);
    html += `<a class="news-row" href="${esc(it.url)}" target="_blank" rel="noopener">
      <span class="row-dot" style="background:${catColor(cat)}"></span>
      <span class="row-cat" style="background:${catBg(cat)};color:${catColor(cat)}">${esc(cat)}</span>
      <span class="row-title">${esc(text)}</span>
      ${srcs ? `<span class="row-srcs">${esc(srcs)}</span>` : ''}
      <span class="row-time">${esc(tstr)}</span>
    </a>`;
  }
  el.innerHTML = html;
}

// ── Ticker ────────────────────────────────────────────────────────────────
function decodeHtml(s) {
  const d = document.createElement('div'); d.innerHTML = s; return d.textContent;
}

function renderTicker() {
  const now = new Date();
  const items = (PINNED.items || []).filter(x => {
    if (!x.url || !x.title) return false;
    try { return new Date(x.expires_at) > now; } catch(e) { return true; }
  });
  const wrap = document.getElementById('tickerWrap');
  const track = document.getElementById('tickerTrack');
  if (!items.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';
  const seg = items.map(it => {
    const srcs = (it.sources || []).slice(0, 3).join(' · ');
    const srcBadge = srcs ? `<span class="ticker-src">${esc(srcs)}</span>` : '';
    const title = decodeHtml(it.title || '');
    return `<span class="ticker-item">${srcBadge}<a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(title)}</a></span><span class="ticker-sep">·</span>`;
  }).join('');
  track.innerHTML = seg + seg;
  const totalChars = items.reduce((s, x) => s + x.title.length, 0);
  track.style.animationDuration = Math.max(30, totalChars * 0.4) + 's';
}

// ── 渲染全部 ──────────────────────────────────────────────────────────────
let stocksReady = false;

function byTime(a, b) {
  return (b.published_at || '') > (a.published_at || '') ? 1 : -1;
}

function renderAll() {
  renderTicker();

  // Tab 1-3: 按 relevance_score 降序（管线已排好，直接 filter+slice）
  // 顺序 = 管线当日固定评分，不随实时动态变化
  const feedItems   = DIGEST.filter(x => catTab(x.category) === 'feed').slice(0, 15);
  renderGrid('feedGrid', feedItems);
  document.getElementById('cntFeed').textContent = feedItems.length;

  const modelItems  = DIGEST.filter(x => catTab(x.category) === 'models').slice(0, 15);
  renderGrid('modelGrid', modelItems);
  renderAllRankings('rankingsAll');
  document.getElementById('cntModels').textContent = modelItems.length;

  const investItems = DIGEST.filter(x => catTab(x.category) === 'invest').slice(0, 15);
  renderGrid('investGrid', investItems);
  document.getElementById('cntInvest').textContent = investItems.length + STOCKS.length;

  renderArchive();
  renderSources();

  stocksReady = false;
  if (document.getElementById('tab-invest').classList.contains('active')) {
    renderStocks(); stocksReady = true;
  }
}

// ── Tab 切换 ──────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-'+name));
  if (name === 'invest' && !stocksReady) { renderStocks(); stocksReady = true; }
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
document.getElementById('refreshBtn').addEventListener('click', async () => {
  const chip = document.getElementById('refreshBtn');
  const tag  = document.getElementById('updatedTag');
  chip.classList.add('loading');
  tag.textContent = '读取中…';
  await loadData();
  renderAll();
});
document.getElementById('dateStr').textContent = new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

// ── 启动 ──────────────────────────────────────────────────────────────────
(async () => { await loadData(); renderAll(); })();
</script>

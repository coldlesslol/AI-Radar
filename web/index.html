<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coldless AI Radar</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Noto+Serif+SC:wght@400;500;600&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* Coldless P1 · 纸墨系统（design-brief v2）*/
  --bg: #F5F3EE;            /* 纸白 */
  --surface: #FFFFFF;       /* 卡片白 */
  --border: #CCBFAA;        /* 结构线 */
  --border-hover: #111111;
  --text-primary: #111111;  /* 墨黑 */
  --text-secondary: #666660;
  --text-muted: #8F8B80;
  --accent: #5C1A1A;        /* 深酒红，唯一 accent */
  --serif: "Fraunces", "Noto Serif SC", Georgia, serif;
  --sans: "Inter", -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  --mono: "JetBrains Mono", ui-monospace, monospace;
  color-scheme: light;
}
* { box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text-primary); margin: 0; padding: 0; line-height: 1.6; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }

/* Layout */
.container { max-width: 1280px; margin: 0 auto; padding: 16px 16px 60px; }
header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; padding: 10px 0 12px; border-bottom: 1px solid var(--text-primary); }
.brand { font-family: var(--serif); font-size: 30px; font-weight: 600; letter-spacing: 0.2px; display: flex; align-items: baseline; gap: 10px; line-height: 1.1; }
.brand-accent { color: var(--text-primary); }
.brand-meta { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 400; text-transform: uppercase; }
.header-right { display: flex; align-items: center; gap: 10px; }
.update-chip { display: inline-flex; align-items: center; gap: 6px; background: transparent; border: 1px solid var(--border); border-radius: 0; padding: 5px 12px; cursor: pointer; font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--text-secondary); transition: border-color 0.12s; white-space: nowrap; user-select: none; }
.update-chip:hover { border-color: var(--text-primary); }
.update-chip.loading { color: var(--text-muted); }
.update-dot { width: 6px; height: 6px; background: var(--accent); flex-shrink: 0; }
.update-chip.loading .update-dot { background: var(--border); }
.update-icon { font-size: 12px; opacity: 0.6; }

/* Tabs */
.tabs { display: flex; gap: 2px; margin-bottom: 14px; border-bottom: 1px solid var(--border); }
.tab { padding: 9px 16px; cursor: pointer; font-family: var(--sans); font-size: 12px; font-weight: 500; letter-spacing: 1px; color: var(--text-muted); border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.12s; white-space: nowrap; }
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); font-weight: 500; }
.tab .cnt { display: inline-block; margin-left: 5px; font-family: var(--mono); font-size: 9.5px; color: var(--text-muted); padding: 0 4px; border: 1px solid var(--border); }
.tab.active .cnt { color: var(--text-primary); border-color: var(--text-primary); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Category colors — P1 墨色系：分类靠文字标签区分，不靠颜色（brief v2） */
:root {
  --c-model:    #111111; --c-model-bg:    transparent;
  --c-agent:    #111111; --c-agent-bg:    transparent;
  --c-research: #111111; --c-research-bg: transparent;
  --c-product:  #111111; --c-product-bg:  transparent;
  --c-industry: #111111; --c-industry-bg: transparent;
  --c-community:#111111; --c-community-bg:transparent;
  --c-invest:   #111111; --c-invest-bg:   transparent;
  --c-supply:   #111111; --c-supply-bg:   transparent;
}

/* News cards grid — 固定 3 列，最多 15 张 */
.cards-grid { display: grid; gap: 10px; grid-template-columns: repeat(3, 1fr); }

.news-card { background: var(--surface); border: 1px solid var(--border); border-radius: 0; padding: 13px 14px 11px; display: flex; flex-direction: column; gap: 6px; transition: border-color 0.12s; position: relative; border-left-width: 3px; }
.news-card:hover { border-color: var(--border-hover); }
.news-card.high { background: var(--surface); }

/* card meta row */
.card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; }
.cat-tag { font-size: 9.5px; font-weight: 500; letter-spacing: 1px; padding: 0; white-space: nowrap; flex-shrink: 0; }
.multi-badge { font-family: var(--mono); font-size: 9.5px; padding: 1px 6px; background: transparent; color: var(--text-secondary); font-weight: 400; border: 1px solid var(--border); }
.archive-badge { font-family: var(--mono); font-size: 9px; color: var(--text-muted); background: transparent; padding: 1px 5px; border: 1px solid var(--border); font-weight: 400; }
.src-list { font-family: var(--mono); font-size: 9.5px; color: var(--text-muted); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.time-tag { font-family: var(--mono); font-size: 9.5px; color: var(--text-muted); margin-left: auto; white-space: nowrap; flex-shrink: 0; }
.score-badge { font-family: var(--mono); font-size: 10.5px; color: var(--text-secondary); }
.score-badge.hi { color: var(--accent); font-weight: 500; }

/* card body */
.card-summary { font-family: var(--serif); font-size: 15px; font-weight: 500; color: var(--text-primary); line-height: 1.5; margin: 0; flex: 1; }
.card-title-en { font-size: 11px; color: var(--text-muted); line-height: 1.4; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* card footer */
.card-footer { display: flex; align-items: center; justify-content: flex-end; margin-top: 2px; }
.read-link { font-size: 11px; color: var(--accent); font-weight: 500; }
.read-link:hover { text-decoration: underline; }

/* Section headers */
.section-head { display: flex; align-items: baseline; gap: 8px; margin: 22px 0 10px; padding-bottom: 6px; border-bottom: 3px double var(--border); }
.section-icon { display: none; }
.section-title { font-family: var(--serif); font-size: 16px; font-weight: 500; color: var(--text-primary); }
.section-sub { font-family: var(--mono); font-size: 9.5px; letter-spacing: 1px; color: var(--text-muted); margin-left: auto; text-transform: uppercase; }
.live-dot { font-family: var(--mono); font-size: 9px; letter-spacing: 1px; padding: 1px 6px; border: 1px solid var(--border); color: var(--text-secondary); }

/* Rankings */
.rankings-grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); margin-bottom: 16px; }
.rank-card { background: var(--surface); border: 1px solid var(--border); border-radius: 0; padding: 12px 14px; }
.rank-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); gap: 6px; }
.rank-title { font-family: var(--serif); font-size: 13px; font-weight: 500; color: var(--text-primary); display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.rank-date { font-family: var(--mono); font-size: 9.5px; color: var(--text-muted); white-space: nowrap; }
.rank-list { list-style: none; padding: 0; margin: 0; }
.rank-list li { font-size: 11.5px; color: var(--text-secondary); padding: 3px 0; display: flex; align-items: center; gap: 6px; }
.rank-num { display: inline-flex; align-items: center; justify-content: center; width: 16px; font-family: var(--mono); background: transparent; color: var(--text-muted); font-size: 9.5px; font-weight: 400; flex-shrink: 0; }
.rank-num.top3 { color: var(--accent); font-weight: 500; }
.rank-val { margin-left: auto; color: var(--text-muted); font-size: 10.5px; font-family: var(--mono); white-space: nowrap; }
.rank-gh-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rank-link { display: block; margin-top: 8px; padding-top: 6px; border-top: 1px solid var(--border); font-size: 11px; color: var(--accent); }
.rank-link:hover { text-decoration: underline; }
.entry-desc { font-size: 11.5px; color: var(--text-secondary); }
.entry-desc li { padding: 2px 0; }

/* Filings chips */
.filings-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.filing-chip { display: inline-flex; align-items: center; gap: 7px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 0; font-size: 12px; color: var(--text-secondary); text-decoration: none; background: var(--surface); transition: border-color 0.12s; }
.filing-chip:hover { border-color: var(--border-hover); }
.filing-form { font-family: var(--mono); font-size: 9px; font-weight: 500; background: transparent; color: var(--text-primary); padding: 1px 5px; border: 1px solid var(--text-primary); }
.filing-date { font-family: var(--mono); font-size: 10px; color: var(--text-muted); }

/* Research rows */
.research-list { display: flex; flex-direction: column; gap: 0; margin-bottom: 16px; }
.research-row { display: flex; align-items: baseline; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); text-decoration: none; color: inherit; }
.research-row:last-child { border-bottom: none; }
.research-row:hover .research-title { color: var(--text-primary); text-decoration: underline; }
.research-source { font-family: var(--mono); font-size: 9.5px; font-weight: 600; color: var(--accent); white-space: nowrap; min-width: 90px; }
.research-title { flex: 1; font-size: 13px; font-weight: 500; color: var(--text-secondary); line-height: 1.45; }
.research-date { font-family: var(--mono); font-size: 10px; color: var(--text-muted); white-space: nowrap; }

/* Stocks — 固定 5 列 */
.stocks-grid  { display: grid; gap: 10px; grid-template-columns: repeat(5, 1fr); margin-bottom: 16px; }
.indices-grid { display: grid; gap: 10px; grid-template-columns: repeat(5, 1fr); margin-bottom: 16px; }
.stock-card { background: var(--surface); border: 1px solid var(--border); border-radius: 0; padding: 12px 13px; display: flex; flex-direction: column; gap: 3px; text-decoration: none; color: inherit; transition: border-color 0.12s; position: relative; }
.stock-card:hover { border-color: var(--border-hover); }
.stock-card.private-co { opacity: 0.75; cursor: default; }
.stock-card.index-card { border-left: 3px solid var(--border); }
.stock-region-badge { position: absolute; top: 9px; right: 9px; font-family: var(--mono); font-size: 8.5px; padding: 1px 5px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-weight: 400; }
.stock-ticker { font-family: var(--mono); font-size: 13px; font-weight: 500; }
.stock-name { font-size: 10.5px; color: var(--text-muted); }
.stock-price { font-family: var(--mono); font-size: 17px; font-weight: 500; margin-top: 2px; }
.private-note { font-family: var(--mono); font-size: 9.5px; color: var(--text-muted); margin-top: 6px; }
.up { color: #dc2626; }
.down { color: #16a34a; }
.spark { height: 40px; margin-top: 6px; }
.spark canvas { width: 100% !important; height: 100% !important; }

/* Filings dropdown */
.filings-select-wrap { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.filings-select { font-family: var(--mono); font-size: 11px; color: var(--text-primary); background: var(--surface); border: 1px solid var(--border); padding: 6px 10px; border-radius: 0; cursor: pointer; min-width: 160px; }
.filings-select:focus { outline: none; border-color: var(--text-primary); }
.filings-result { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

/* Research pagination */
.pager { display: flex; gap: 4px; margin: 12px 0 4px; }
.pager-btn { font-family: var(--mono); font-size: 10.5px; padding: 3px 10px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.1s; }
.pager-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }
.pager-btn.active { border-color: var(--text-primary); color: var(--text-primary); font-weight: 600; background: var(--text-primary); color: var(--bg); }

/* Sources block — 平铺 */
.sources-block { background: var(--surface); border: 1px solid var(--border); border-radius: 0; padding: 14px 18px; margin-top: 24px; }
.sources-title { font-family: var(--serif); font-size: 13px; font-weight: 500; color: var(--text-primary); margin: 0 0 10px; }
.pills-flat { display: flex; flex-wrap: wrap; gap: 5px; }
.pill-f { display: inline-flex; align-items: center; gap: 3px; padding: 3px 9px; border-radius: 0; font-size: 11px; font-weight: 400; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); text-decoration: none; transition: border-color 0.12s, color 0.12s; }
.pill-f:hover { border-color: var(--text-primary); color: var(--text-primary); }
.pill-stars { font-family: var(--mono); font-size: 9px; opacity: 0.65; }
/* 类别不再用色彩区分（brief v2 墨色系）；hover 统一提亮 */

/* Archive list (全部新闻 tab) */
.news-list { display: flex; flex-direction: column; }
.date-divider { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); padding: 16px 0 7px; border-bottom: 1px solid var(--border); }
.news-row { display: flex; align-items: center; gap: 8px; padding: 9px 4px; border-bottom: 1px solid #E8E4DA; text-decoration: none; color: inherit; border-radius: 0; transition: background 0.08s; }
.news-row:hover { background: #EFECE4; }
.row-dot { width: 6px; height: 6px; flex-shrink: 0; }
.row-cat { font-size: 9.5px; font-weight: 500; letter-spacing: 0.5px; padding: 1px 0; flex-shrink: 0; white-space: nowrap; color: var(--text-secondary) !important; }
.row-title { flex: 1; font-family: var(--serif); font-size: 13.5px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.row-srcs { font-family: var(--mono); font-size: 10px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
.row-time { font-family: var(--mono); font-size: 10px; color: var(--text-muted); white-space: nowrap; min-width: 28px; text-align: right; flex-shrink: 0; }

/* Misc */
.err-box { background: var(--surface); border-left: 3px solid var(--accent); border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 9px 13px; font-size: 12px; color: var(--accent); margin-bottom: 12px; }
footer { margin-top: 28px; padding-top: 12px; border-top: 1px solid var(--text-primary); font-family: var(--mono); font-size: 10px; letter-spacing: 0.5px; color: var(--text-muted); text-align: center; }
footer code { font-family: var(--mono); padding: 1px 4px; border: 1px solid var(--border); }
.empty-tip { font-size: 12.5px; color: var(--text-muted); padding: 12px 0; }
.freq-badge { font-family: var(--mono); font-size: 9px; padding: 0 5px; border: 1px solid var(--border); color: var(--text-muted); font-weight: 400; }
.freq-daily   { color: var(--text-primary); border-color: var(--text-primary); }
.freq-weekly, .freq-monthly, .freq-quarter { }

/* ── Ticker ────────────────────────────────────────────────────────────── */
.ticker-wrap { background: #111; overflow: hidden; height: 34px; display: none; align-items: center; margin: 10px -16px 14px; }
.ticker-label { font-family: var(--mono); font-size: 9.5px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; padding: 0 14px; background: var(--accent); color: #F5F3EE; height: 100%; display: flex; align-items: center; flex-shrink: 0; white-space: nowrap; }
.ticker-scroll { overflow: hidden; flex: 1; height: 100%; display: flex; align-items: center; }
.ticker-track { display: inline-flex; align-items: center; white-space: nowrap; animation: ticker-run 60s linear infinite; }
.ticker-track:hover { animation-play-state: paused; }
.ticker-item { display: inline-flex; align-items: center; color: #d1d5db; font-size: 12px; padding: 0 28px 0 0; gap: 6px; }
.ticker-item a { color: #e5e7eb; text-decoration: none; transition: color 0.12s; }
.ticker-item a:hover { color: #fff; text-decoration: underline; }
.ticker-sep { color: #374151; font-size: 16px; margin-right: 28px; }
.ticker-src { font-family: var(--mono); font-size: 9.5px; background: #333330; color: #B8B4A8; padding: 1px 5px; flex-shrink: 0; }
@keyframes ticker-run {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* ── Responsive（P1：移动端断点）──────────────────────────────────────── */
@media (max-width: 1080px) {
  .cards-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 680px) {
  .cards-grid { grid-template-columns: 1fr; }
  .container { padding: 12px 12px 48px; }
  .brand { font-size: 23px; }
  .brand-meta { display: none; }
  .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 9px 12px; font-size: 11.5px; }
  .section-sub { display: none; }
  .ticker-wrap { margin: 10px -12px 14px; }
}

/* ── Header watermark ───────────────────────────────────────────────────── */
header { position: relative; overflow: hidden; }
.header-bg { display: none; /* P1: 水印退役，品牌收敛为 nameplate（brief v2）；素材保留在 assets/ */ }
</style>
</head>
<body>
<div class="container">

<header>
  <div class="header-bg"></div>
  <div class="brand">
    Coldless <span class="brand-accent">AI Radar</span>
    <span class="brand-meta" id="dateStr"></span>
  </div>
  <div class="header-right">
    <button class="update-chip loading" id="refreshBtn" title="点击重新读取本地缓存（不消耗 API，不重新抓取数据）">
      <span class="update-dot"></span>
      <span id="updatedTag">加载中…</span>
      <span class="update-icon">↺</span>
    </button>
  </div>
</header>

<div class="ticker-wrap" id="tickerWrap">
  <div class="ticker-label">重要</div>
  <div class="ticker-scroll">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>
</div>

<div id="errBox" class="err-box" style="display:none"></div>

<div class="tabs">
  <button class="tab active" data-tab="feed">近期要闻 <span class="cnt" id="cntFeed"></span></button>
  <button class="tab" data-tab="models">模型 & 榜单 <span class="cnt" id="cntModels"></span></button>
  <button class="tab" data-tab="invest">投融资 & 二级 <span class="cnt" id="cntInvest"></span></button>
  <button class="tab" data-tab="all">全部新闻 <span class="cnt" id="cntAll"></span></button>
</div>

<!-- Tab 1: 今日要闻 -->
<div class="tab-panel active" id="tab-feed">
  <div id="feedGrid" class="cards-grid"></div>
  <div id="feedSources"></div>
</div>

<!-- Tab 2: 模型 & 榜单 -->
<div class="tab-panel" id="tab-models">
  <div class="section-head"><span class="section-icon">🚀</span><span class="section-title">模型 & 研究</span></div>
  <div id="modelGrid" class="cards-grid"></div>
  <div class="section-head" style="margin-top:24px"><span class="section-icon">📊</span><span class="section-title">榜单总览</span><span class="section-sub">日更数据 + 链接入口</span></div>
  <div id="rankingsAll" class="rankings-grid"></div>
</div>

<!-- Tab 3: 投融资 & 二级 -->
<div class="tab-panel" id="tab-invest">
  <div id="investGrid" class="cards-grid"></div>

  <div class="section-head" style="margin-top:24px"><span class="section-title">研报 & 深度分析</span><span class="section-sub">SemiAnalysis · Latent Space · Interconnects · Ahead of AI · Import AI</span></div>
  <div id="researchList" class="research-list"></div>
  <div class="pager" id="researchPager"></div>

  <div class="section-head" style="margin-top:20px"><span class="section-title">最新财报</span><span class="section-sub">美股 SEC · 选标的查季报/年报</span></div>
  <div class="filings-select-wrap">
    <select class="filings-select" id="filingsTicker" onchange="onFilingsTicker()">
      <option value="">— 选择标的 —</option>
    </select>
    <select class="filings-select" id="filingsForm" onchange="onFilingsForm()" disabled>
      <option value="">— 选择报告 —</option>
    </select>
  </div>
  <div id="filingsResult" class="filings-result"></div>

  <div class="section-head" style="margin-top:20px"><span class="section-title">大盘行情</span><span class="section-sub">S&P 500 · QQQ · 上证 · 沪深300 · 恒生</span><span class="live-dot">日更</span></div>
  <div id="indicesGrid" class="indices-grid"></div>

  <div class="section-head" style="margin-top:20px"><span class="section-title">AI 核心标的</span><span class="section-sub">美 / A / 港 · 30 天收盘</span><span class="live-dot">日更</span></div>
  <div id="stocksGrid" class="stocks-grid"></div>
</div>

<!-- Tab 4: 全部新闻 -->
<div class="tab-panel" id="tab-all">
  <div id="archiveList" class="news-list"></div>
</div>

<div class="sources-block">
  <div class="sources-title" id="sourcesTitle">信源直达</div>
  <div id="sourcesWrap"></div>
</div>

<footer>
  Coldless AI Radar · 数据由 <code>run_daily.sh</code> 每日 10:00 拉取 · Claude 打分排序
</footer>
</div>

<script>

function newsCard(item) {
  const cat = item.category || '行业动态';
  const isHigh = (item.relevance_score || 0) >= 0.8;
  const isMulti = (item.source_count || 1) >= 2;
  const srcNames = (item.sources || [item._source]).filter(Boolean);

  const multiBadge = isMulti
    ? `<span class="multi-badge">${item.source_count}源</span>`
    : '';
  const archiveBadge = item._from_archive
    ? '<span class="archive-badge">历史</span>'
    : '';
  const srcLabel = srcNames.slice(0, 4).join(' · ') + (srcNames.length > 4 ? ` +${srcNames.length - 4}` : '');

  const summary = item.summary_cn || item.summary || '';
  const titleEn = item.title || '';
  // relTime() 用 published_at 实时计算，比 RSS 抓取时存下的 time 字段更准确
  const timeStr = relTime(item.published_at || item.first_seen_at || '') || item.time || '';
  const scoreBadge = item.relevance_score != null
    ? `<span class="score-badge${isHigh?' hi':''}"${timeStr?'':' style="margin-left:auto"'}>${Number(item.relevance_score).toFixed(2)}</span>`
    : '';

  return `<div class="news-card${isHigh?' high':''}" style="border-left-color:${catColor(cat)}">
    <div class="card-meta">
      <span class="cat-tag" style="background:${catBg(cat)};color:${catColor(cat)}">${esc(cat)}</span>
      ${multiBadge}${archiveBadge}
      <span class="src-list">${esc(srcLabel)}</span>
      ${timeStr ? `<span class="time-tag">${esc(timeStr)}</span>` : ''}
      ${scoreBadge}
    </div>
    <p class="card-summary">${esc(summary)}</p>
    ${titleEn ? `<p class="card-title-en">${esc(titleEn)}</p>` : ''}
    <div class="card-footer">
      ${item.url ? `<a class="read-link" href="${esc(item.url)}" target="_blank" rel="noopener">查看原文 →</a>` : ''}
    </div>
  </div>`;
}

function stockCardHTML(s, idx, extraClass) {
  const sym = s.currency==='CNY'?'¥':(s.currency==='HKD'?'HK$':'$');
  const h = s.history_30d || [];

    <div class="spark"><canvas id="sp${idx}"></canvas></div>
  </a>`;
}

function drawSpark(stocks, prefix) {
  stocks.forEach((s, i) => {
    const canvas = document.getElementById(`${prefix}${i}`);
    if (!canvas) return;
    const h = s.history_30d || [];
    const up = h.length >= 2 ? h[h.length-1] >= h[0] : true;
    const col = up ? '#dc2626' : '#16a34a';
    const key = prefix + s.ticker;
    sparkCharts[key]?.destroy?.();
    sparkCharts[key] = new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: { labels: h.map((_,j)=>j), datasets:[{ data:h, borderColor:col, backgroundColor:up?'rgba(220,38,38,0.06)':'rgba(22,163,74,0.06)', fill:true, tension:0.3, pointRadius:0, borderWidth:1.5 }] },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{enabled:false}}, scales:{x:{display:false},y:{display:false}}, animation:false }
    });
  });
}

// ── 数据加载 ──────────────────────────────────────────────────────────────
async function loadData() {
  const errs = [];
  try { META = await getJSON('../data/_index.json'); } catch(e) { META = {files:{}}; errs.push('_index.json: '+e.message); }

  const files = META.files || {};

  // Digest (主数据源：打分+去重+摘要)
  DIGEST = [];
  const chip = document.getElementById('refreshBtn');
  const tag  = document.getElementById('updatedTag');
  if (files.digest) {
    try {
      const d = await getJSON('../data/'+files.digest);
      DIGEST = d.items || [];
      if (d.updated) {
        const dt = new Date(d.updated);
        const now = new Date();
        const isToday = dt.toDateString() === now.toDateString();
        const mm = String(dt.getMonth()+1).padStart(2,'0');
        const dd = String(dt.getDate()).padStart(2,'0');
        const hh = String(dt.getHours()).padStart(2,'0');
        const mi = String(dt.getMinutes()).padStart(2,'0');
        tag.textContent = isToday ? `今日 ${hh}:${mi} 已更新` : `${mm}-${dd} ${hh}:${mi} 已更新`;
        chip.classList.remove('loading');
      } else {
        tag.textContent = '数据已加载';
        chip.classList.remove('loading');
      }
    } catch(e) { errs.push('digest.json: '+e.message); tag.textContent = '加载失败'; }
  }

  // OpenRouter
  RANKINGS = [];
  if (files.rankings_openrouter) {
    try {
      const d = await getJSON('../data/'+files.rankings_openrouter);
      RANKINGS = [{ title: d.title||'OpenRouter 榜单', freq: d.freq||'daily', updated: d.updated||'', url: d.url||'https://openrouter.ai/rankings', rows: d.items||[] }];
    } catch(e) { errs.push('rankings_openrouter: '+e.message); }
  }

  // Stocks + private + indices
  STOCKS = []; PRIVATE_STOCKS = []; INDICES = [];
  if (files.stocks) {
    try {
      const d = await getJSON('../data/'+files.stocks);
      STOCKS         = d.stocks  || [];
      PRIVATE_STOCKS = d.private || [];
      INDICES        = d.indices || [];
    } catch(e) { errs.push('stocks: '+e.message); }
  }

  // GitHub Trending
  GITHUB_TRENDING = {};
  if (files.github_trending) {
    try { GITHUB_TRENDING = await getJSON('../data/'+files.github_trending); }
    catch(e) { errs.push('github_trending: '+e.message); }
  }

  // HuggingFace Trending
  HF_TRENDING = {};
  if (files.huggingface_trending) {
    try { HF_TRENDING = await getJSON('../data/'+files.huggingface_trending); }
    catch(e) { errs.push('huggingface_trending: '+e.message); }
  }

  // Pinned（重要新闻滚动栏，不依赖 _index）
  PINNED = { items: [] };
  try { PINNED = await getJSON('../data/pinned.json'); } catch(e) {}

  // Archive（全部新闻历史归档）
  ARCHIVE = { items: [] };
  if (files.archive) {
    try { ARCHIVE = await getJSON('../data/'+files.archive); }
    catch(e) { errs.push('archive: '+e.message); }
  } else {
    try { ARCHIVE = await getJSON('../data/archive.json'); } catch(e) {}
  }

  // Filings（美股 SEC 财报直链）
  FILINGS = { items: [] };
  try { FILINGS = await getJSON('../data/filings.json'); } catch(e) {}

  const errBox = document.getElementById('errBox');
  if (errs.length) { errBox.style.display='block'; errBox.textContent = '⚠️ 部分数据加载失败：'+errs.join('；'); }
  else { errBox.style.display='none'; }
}

// ── 归档列表渲染（全部新闻 tab）─────────────────────────────────────────────
function relTime(isoStr) {
  if (!isoStr) return '';
  const diff = Date.now() - new Date(isoStr).getTime();
  const h = diff / 3600000;
  if (h < 1)  return Math.floor(diff / 60000) + 'm';
  if (h < 24) return Math.floor(h) + 'h';
  const d = Math.floor(h / 24);
  return d + 'd';
}

function dateDividerLabel(isoStr) {
  if (!isoStr) return '';
  const dt  = new Date(isoStr);
  const now = new Date();
  const diffDays = Math.floor((Date.now() - dt.getTime()) / 86400000);
  const mm  = String(dt.getMonth() + 1).padStart(2, '0');
  const dd  = String(dt.getDate()).padStart(2, '0');
  if (diffDays === 0) return `今日 · ${mm}月${dd}日`;
  if (diffDays === 1) return `昨日 · ${mm}月${dd}日`;
  return `${mm}月${dd}日`;
}

function renderArchive() {
  const el = document.getElementById('archiveList');
  const items = (ARCHIVE.items || []);
  document.getElementById('cntAll').textContent = items.length;
  if (!items.length) { el.innerHTML = '<p class="empty-tip">暂无归档数据，明日 10:00 管线运行后自动生成</p>'; return; }

  let html = '';
  let lastDay = '';
  for (const it of items) {
    const dateKey = (it.published_at || it.first_seen_at || '').slice(0, 10);
    if (dateKey && dateKey !== lastDay) {
      html += `<div class="date-divider">${esc(dateDividerLabel(it.published_at || it.first_seen_at))}</div>`;
      lastDay = dateKey;
    }
    const cat   = it.category || '行业动态';
    const text  = it.summary_cn || it.title || '';
    const srcs  = (it.sources || []).slice(0, 3).join(' · ');
    const tstr  = relTime(it.published_at || it.first_seen_at);
    html += `<a class="news-row" href="${esc(it.url)}" target="_blank" rel="noopener">
      <span class="row-dot" style="background:${catColor(cat)}"></span>
      <span class="row-cat" style="background:${catBg(cat)};color:${catColor(cat)}">${esc(cat)}</span>
      <span class="row-title">${esc(text)}</span>
      ${srcs ? `<span class="row-srcs">${esc(srcs)}</span>` : ''}
      <span class="row-time">${esc(tstr)}</span>
    </a>`;
  }
  el.innerHTML = html;
}

// ── 财报下拉渲染 ──────────────────────────────────────────────────────────
function renderFilings() {
  const tickerSel = document.getElementById('filingsTicker');
  if (!tickerSel) return;
  const items = FILINGS.items || [];
  if (!items.length) {
    tickerSel.innerHTML = '<option value="">暂无财报数据</option>';
    return;
  }
  // 按 ticker 分组
  const byTicker = {};
  items.forEach(f => { (byTicker[f.ticker] = byTicker[f.ticker] || []).push(f); });
  tickerSel.innerHTML = '<option value="">— 选择标的 —</option>' +
    Object.keys(byTicker).map(t => {
      const co = byTicker[t][0].company || t;
      return `<option value="${esc(t)}">${esc(t)} · ${esc(co)}</option>`;
    }).join('');
  document.getElementById('filingsResult').innerHTML = '';
}

function onFilingsTicker() {
  const ticker = document.getElementById('filingsTicker').value;
  const formSel = document.getElementById('filingsForm');
  const result  = document.getElementById('filingsResult');
  if (!ticker) { formSel.innerHTML = '<option value="">— 选择报告 —</option>'; formSel.disabled = true; result.innerHTML = ''; return; }
  const filings = (FILINGS.items || []).filter(f => f.ticker === ticker);
  formSel.innerHTML = '<option value="">— 选择报告 —</option>' +
    filings.map(f => `<option value="${esc(f.url)}">${esc(f.form)} · ${esc((f.date||'').slice(0,10))}</option>`).join('');
  formSel.disabled = false;
  result.innerHTML = '';
}

function onFilingsForm() {
  const url = document.getElementById('filingsForm').value;
  const result = document.getElementById('filingsResult');
  if (!url) { result.innerHTML = ''; return; }
  const ticker = document.getElementById('filingsTicker').value;
  const f = (FILINGS.items || []).find(x => x.url === url && x.ticker === ticker);
  if (!f) return;
  result.innerHTML = `<a class="filing-chip" href="${esc(f.url)}" target="_blank" rel="noopener">
    <span class="filing-form">${esc(f.form)}</span>
    <span>${esc(f.ticker)} · ${esc(f.company||f.ticker)}</span>
    <span class="filing-date">${esc((f.date||'').slice(0,10))}</span>
    <span style="font-family:var(--mono);font-size:9px;color:var(--accent);margin-left:4px">→ SEC EDGAR ↗</span>
  </a>`;
}

// ── 研报渲染（分页，最多 30 条）─────────────────────────────────────────
const RESEARCH_SOURCES = new Set([
  'SemiAnalysis','Latent Space','Import AI','Interconnects','Ahead of AI',
  'ARK Invest','Benedict Evans'
]);
const RESEARCH_PAGE_SIZE = 6;
let researchPage = 1;
let researchItems = [];

function buildResearchItems() {
  const seen = new Set();
  const combined = [...DIGEST, ...(ARCHIVE.items || [])];
  const filtered = [];
  for (const x of combined) {
    if (!x.url || seen.has(x.url)) continue;
    const match = (x.sources || []).find(s => RESEARCH_SOURCES.has(s));
    if (!match) continue;
    seen.add(x.url);
    filtered.push({...x, _researchSrc: match});
  }
  filtered.sort((a, b) => (b.relevance_score||0) - (a.relevance_score||0));
  return filtered.slice(0, 30);
}

function renderResearch(page) {
  researchPage = page || researchPage;
  if (!researchItems.length) researchItems = buildResearchItems();

  const el    = document.getElementById('researchList');
  const pager = document.getElementById('researchPager');
  if (!el) return;

  if (!researchItems.length) {
    el.innerHTML = '<p class="empty-tip">暂无深度分析文章，通常每周更新 1–3 篇</p>';
    if (pager) pager.innerHTML = '';
    return;
  }

  const totalPages = Math.min(5, Math.ceil(researchItems.length / RESEARCH_PAGE_SIZE));
  const start = (researchPage - 1) * RESEARCH_PAGE_SIZE;
  const page_items = researchItems.slice(start, start + RESEARCH_PAGE_SIZE);

  el.innerHTML = page_items.map(x => {
    const src  = x._researchSrc || '';
    const date = (x.published_at || '').slice(0, 10);
    const score = x.relevance_score ? `<span class="research-date" style="color:var(--accent)">${x.relevance_score.toFixed(2)}</span>` : '';
    return `<a class="research-row" href="${esc(x.url||'#')}" target="_blank" rel="noopener">
      <span class="research-source">${esc(src)}</span>
      <span class="research-title">${esc(x.title||'')}</span>
      ${score}
      <span class="research-date">${esc(date)}</span>
    </a>`;
  }).join('');

  if (pager) {
    pager.innerHTML = Array.from({length: totalPages}, (_,i) => {
      const p = i + 1;
      return `<button class="pager-btn${p===researchPage?' active':''}" onclick="renderResearch(${p})">${p}</button>`;
    }).join('');
  }
}

// ── Ticker ────────────────────────────────────────────────────────────────
function decodeHtml(s) {
  const d = document.createElement('div'); d.innerHTML = s; return d.textContent;
}

function renderTicker() {
  const now = new Date();
  const items = (PINNED.items || []).filter(x => {
    if (!x.url || !x.title) return false;
    try { return new Date(x.expires_at) > now; } catch(e) { return true; }
  });
  const wrap = document.getElementById('tickerWrap');
  const track = document.getElementById('tickerTrack');
  if (!items.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';
  const seg = items.map(it => {
    const srcs = (it.sources || []).slice(0, 3).join(' · ');
    const srcBadge = srcs ? `<span class="ticker-src">${esc(srcs)}</span>` : '';
    const title = decodeHtml(it.title || '');
    return `<span class="ticker-item">${srcBadge}<a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(title)}</a></span><span class="ticker-sep">·</span>`;
  }).join('');
  track.innerHTML = seg + seg;
  const totalChars = items.reduce((s, x) => s + x.title.length, 0);
  track.style.animationDuration = Math.max(30, totalChars * 0.4) + 's';
}

// ── 渲染全部 ──────────────────────────────────────────────────────────────
let stocksReady = false;

function byTime(a, b) {
  return (b.published_at || '') > (a.published_at || '') ? 1 : -1;
}

// 不足 15 张时从 archive 按评分补位（最重要的历史内容垫底）
function fillToFifteen(digestItems, tabName) {
  const TAB_SIZE = 15;
  if (digestItems.length >= TAB_SIZE) return digestItems.slice(0, TAB_SIZE);
  const shown  = new Set(digestItems.map(x => x.url).filter(Boolean));
  const needed = TAB_SIZE - digestItems.length;
  const backfill = (ARCHIVE.items || [])
    .filter(x => catTab(x.category) === tabName && x.url && !shown.has(x.url))
    .sort((a, b) => (b.relevance_score || 0) - (a.relevance_score || 0))
    .slice(0, needed)
    .map(x => ({...x, _from_archive: true}));
  return [...digestItems, ...backfill];
}

function renderAll() {
  renderTicker();

  // Tab 1-3: 管线评分顺序；不足 15 条时从 archive 按评分补位
  const feedItems   = fillToFifteen(DIGEST.filter(x => catTab(x.category) === 'feed'),   'feed');
  renderGrid('feedGrid', feedItems);
  document.getElementById('cntFeed').textContent = feedItems.length;

  const modelItems  = fillToFifteen(DIGEST.filter(x => catTab(x.category) === 'models'), 'models');
  renderGrid('modelGrid', modelItems);
  renderAllRankings('rankingsAll');
  document.getElementById('cntModels').textContent = modelItems.length;

  const investItems = fillToFifteen(DIGEST.filter(x => catTab(x.category) === 'invest'), 'invest');
  renderGrid('investGrid', investItems);
  document.getElementById('cntInvest').textContent = investItems.length + STOCKS.length + PRIVATE_STOCKS.length;

  researchItems = [];  // 重置，触发 buildResearchItems() 重新合并 DIGEST + ARCHIVE
  renderResearch(1);
  renderFilings();
  renderArchive();
  renderSources();

  stocksReady = false;
  if (document.getElementById('tab-invest').classList.contains('active')) {
    renderStocks(); renderIndices(); stocksReady = true;
  }
}

// ── Tab 切换 ──────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-'+name));
  if (name === 'invest' && !stocksReady) { renderStocks(); renderIndices(); stocksReady = true; }
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
document.getElementById('refreshBtn').addEventListener('click', async () => {
  const chip = document.getElementById('refreshBtn');
  const tag  = document.getElementById('updatedTag');
  chip.classList.add('loading');
  tag.textContent = '读取中…';
  await loadData();
  renderAll();
});
document.getElementById('dateStr').textContent = new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

// ── 启动 ──────────────────────────────────────────────────────────────────
(async () => { await loadData(); renderAll(); })();
</script>
